version: '3.8'

services:
  # BloodMate Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bloodmate-web
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DB_HOST=mysql
      - DB_NAME=bloodmate
      - DB_USER=bloodmate_user
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_ENV=production
      - APP_URL=${APP_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./uploads:/var/www/html/uploads
      - ./logs:/var/www/html/logs
      - ./cache:/var/www/html/cache
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bloodmate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: bloodmate-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=bloodmate
      - MYSQL_USER=bloodmate_user
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - bloodmate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: bloodmate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bloodmate-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # phpMyAdmin for database management (optional, remove in production)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: bloodmate-phpmyadmin
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=bloodmate_user
      - PMA_PASSWORD=${DB_PASSWORD}
      - UPLOAD_LIMIT=100M
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - bloodmate-network
    restart: unless-stopped
    profiles:
      - development

  # Nginx reverse proxy (for SSL/HTTPS)
  nginx:
    image: nginx:alpine
    container_name: bloodmate-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - web
    networks:
      - bloodmate-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  bloodmate-network:
    driver: bridge
